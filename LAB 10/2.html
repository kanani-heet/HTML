<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>color</title>
	<style type="text/css">
		
		.aco{

			width: 100%;
			height: 500px;
			background: linear-gradient(red, orange, yellow);

		}

		.bco{

			width: 100%;
			height: 500px;
			background: linear-gradient( to bottom right ,red, orange, yellow);

		}

		.cco{

			width: 100%;
			height: 500px;
			background: linear-gradient( to left ,red, orange, yellow);

		}

		.dco{

			width: 100%;
			height: 500px;
			background: linear-gradient( to top ,red, orange, yellow);

		}



		
	</style>
</head>
<body>

	<h1>Demonstrate gradient in CSS.</h1>

	<div class="aco"></div>

	<div class="bco"></div>

	<div class="cco"></div>

	<div class="dco"></div>
	

</body>
</html>
