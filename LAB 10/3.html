<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>color 2</title>
	<style type="text/css">
		
		
		.bco{

			width: 100%;
			height: 500px;
			background: radial-gradient( circle, red, yellow,green);

		}

		.cco{

			width: 100%;
			height: 500px;
			background: radial-gradient( red, yellow,green,purple);

		}

		.dco{

			width: 100%;
			height: 500px;
			background: radial-gradient( red 5%, yellow 50%,green 60%,purple 70%);

		}

	</style>
</head>
<body>

	<h1>Demonstrate gradient in CSS.</h1>

	<div class="bco"></div>

	<div class="cco"></div>

	<div class="dco"></div>

	


</body>
</html>
