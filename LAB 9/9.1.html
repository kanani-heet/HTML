<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>lab 9 layout</title>
	<style type="text/css">

		*{
			box-sizing: border-box;
			margin: 0px;
		}
		
		.header{

			height: 10vh;
			width: 100%;
		}

		.logo{
			height: 100%;
			width: 20%;
			float: left;
			background-image: url(https://darshan.ac.in/Content/media/DU_Logo.svg);
			background-size: 100% 100%;
			background-repeat: no-repeat;


		}
		.nav{
			float: left;
			width: 100%;
			text-align: right;
			padding: 8px;
		}

		.main{

			height: 60vh;
			width: 100%;
		}

		.mainlogo{
			height: 100%;
			width: 100%;
			float: left;
			background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGAn-vqH2dI6r7qhqJmvX5Bc9n9m5UFp0ikQ&s);
			background-size: 100% 100%;
			background-repeat: no-repeat;
			text-align: right;
			padding: 80px;
			color: white;

		}

		.footer{

			height: 30vh;
			width: 100%;
		}

		.box h3{
			float: left;
			height: 100%;
			width: 10%;
			border: 2px solid red;
			margin-top: 2%;
			margin-right: 4%;
			margin-left: 9%;
			padding: 4%;
			
		}

	</style>
</head>
<body>

	<div class="header">
		<div class="logo"></div>
		<div class="nav">
			<a href="#">home</a>
			<a href="#">about</a>
			<a href="#">servies</a>
			<a href="#">my work</a>
			<a href="#">contact</a>
		</div>
	</div>

	<div class="main">
		<div class="mainlogo">
			<h1>i am a devloper hii</h1>
			<p>Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod
			proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</p>
		</div>
	</div>

	<div class="footer">
		<div class="box">
			<h3>pro.1</h3>
			<h3>pro.2</h3>
			<h3>pro.3</h3>
			<h3>pro.4</h3>
		</div>
		
	</div>

</body>
</html>
