<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>
		simple layout with a logo
	</title>
	<style type="text/css">

		*{
			box-sizing: border-box;
			margin: 0px;
		}
		
    .header{
    	background-color: red;
    	height: 10vh;
    	width: 100%;
    }

    .footer{
    	background-color: darkcyan;
    	height: 10vh;
    	width: 100%;
    }

   .mainbody{
    	background-color: yellow;
    	height: 80vh;
    	width: 100%;
    }
    .rightside{
    	float: left;
    	width: 20%;
    	height: 100%;
    	background-color: purple;
    }
    .leftside{
    	float: left;
    	width: 80%;
    	height: 100%;
    	background-color: green;
    }
    .logo{
    	background-color: lightskyblue;
    	height: 100%;
    	width: 15%;
    }	

	</style>
</head>
<body>

   <div class="header">
     <div class="logo"></div>
  </div>

    <div class="mainbody">
    	<div class="rightside"></div>
    	<div class="leftside"></div>

    </div>

	<div class="footer"></div>
    

</body>
</html>
