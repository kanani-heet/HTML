<!DOCTYPE html>
<html>
<head>
    <title>Group and Other Selectors</title>
    <style>
        /* Universal Selector */
        * {
            font-family: Arial;
        }

        /* Group Selector */
        h1, p {
            color: darkblue;
        }

        /* Descendant Selector */
        div p {
            background-color: lightyellow;
            padding: 5px;
        }
    </style>
</head>
<body>

    <h1>Group Selector Example</h1>
    <p>This paragraph is styled using group selector.</p>

    <div>
        <p>This paragraph is inside div (Descendant selector applied).</p>
    </div>

    <p>This paragraph is outside div.</p>

</body>
</html>
