<!DOCTYPE html>
<html>
<head>
    <title>Basic CSS Selectors</title>
    <style>
        /* Element Selector */
        p {
            color: blue;
            font-size: 18px;
        }

        /* Class Selector */
        .highlight {
            color: white;
            background-color: green;
            padding: 5px;
        }

        /* ID Selector */
        #special {
            color: red;
            font-weight: bold;
            font-size: 22px;
        }
    </style>
</head>
<body>

    <h2>Basic CSS Selectors Example</h2>

    <p>This is a normal paragraph using element selector.</p>

    <p class="highlight">This paragraph uses class selector.</p>

    <p id="special">This paragraph uses ID selector.</p>

</body>
</html>
