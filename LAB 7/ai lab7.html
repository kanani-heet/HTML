<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple Layout</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: serif;
    }

    /* HEADER */
    .header{
      width: 100%;
      height: 80px;
      border: 2px solid blue;
      display: flex;
    }

    .logo{
      width: 20%;
      border: 2px solid red;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .menu{
      width: 80%;
      border: 2px solid blue;
      display: flex;
      align-items: center;
      padding-left: 20px;
      gap: 20px;
    }

    .menu a{
      color: blue;
      text-decoration: underline;
      font-size: 20px;
    }

    /* MAIN BODY */
    .main{
      width: 100%;
      display: flex;
      border: 2px solid green;
    }

    /* LEFT SIDEBAR */
    .sidebar{
      width: 25%;
      border: 2px solid orange;
      padding: 20px;
    }

    .sidebar button{
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 18px;
      border: 2px solid black;
      background: white;
      cursor: pointer;
    }

    /* CONTENT AREA */
    .content{
      width: 75%;
      border: 2px solid purple;
      padding: 20px;
    }

    .box-row{
      border: 2px solid purple;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      gap: 20px;
    }

    .box{
      flex: 1;
      height: 120px;
      border: 2px dotted red;
    }

    /* FOOTER */
    .footer{
      width: 100%;
      height: 60px;
      border: 2px solid blue;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Logo Here</div>
    <div class="menu">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT -->
    <div class="sidebar">
      <button>RESULT</button>
      <button>APPLY</button>
      <button>PLACEMENT</button>
      <button>RECRUITMENT</button>
      <button>NEWS</button>
    </div>

    <!-- RIGHT -->
    <div class="content">

      <div class="box-row">
        <div class="box"></div>
        <div class="box"></div>
      </div>

      <div class="box-row">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">Footer</div>

</body>
</html>
