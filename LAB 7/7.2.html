<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>header</title>
	<style type="text/css">
		*{
			box-sizing: border-box;
			margin: 0px;
		}

		.header{
			height: 10vh;
			width: 100%;
			
		}

		.logo,.btn{
			font-size:50px;
			padding: 10px;
			text-transform:capitalize ;
		}
         
         .logo{
         	float: left;
         	height:100%;
			width: 20%;
			border: 2px solid blue;
			text-align:center ;
		}

		.btn{
			float: left;
			height:100%;
			width: 80%;	
			border: 2px solid green;
		}

		a{
			margin: 20px;
		}

		.footer{
			height: 10vh;
			width: 100%;
			border: 2px solid blue;
		}

		.main{
           height: 80vh;
			width: 100%;
		}

		.left{
			float: left;
			height: 100%;
			width: 30%;
			border: 2px solid yellow;

		}

		.right{
			float: left;
			height: 100%;
			width: 70%;
			border: 2px solid orange;
		}

		.l{
			border: 2px solid dimgrey;
			margin: 20px;
			padding: 30px;
			text-align: center;
			font-size: 40px;
         }

         .r{
            border: 2px dotted pink;
         	height: 25vh;
			width: 75%;
			margin: 10px;
         }

         .o{

           border: 2px dotted blue;
         	height: 15vh;
			width: 45%;
			margin: 10px;
         }

         .i{
         	border: 2px solid red;
         	height: 35vh;
			width: 95%;
			margin: 20px;
         }
	
		
	</style>	
		
</head>
<body>

   <div class="header">
   	<div class="logo">logo here</div>
    <div class="btn">
    	<a href="about us.html">about us</a>
    	<a href="content.html">content </a>
    	<a href="home.html">home</a>
    </div>
   </div>

<div class="main">
   	<div class="left">
       
   		<div class="l">result</div>
   		<div class="l">aplly</div>
   		<div class="l">placement</div>
   		<div class="l">recrutment</div>
   		<div class="l">news</div>
        
   	</div>
   	<div class="right">
   		
   		<div class="i">
   			<div class="r"></div>
   			<div class="r"></div>
   		</div>
   		<div class="i">
   			<div class="o"></div>
   			<div class="o"></div>
   			<div class="o"></div>
   		</div>

   	</div>
   </div>

  <div class="footer">footer</div>
   
</body>
</html>
