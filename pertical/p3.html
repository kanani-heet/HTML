<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap p3</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>


  <div class="h2 text-center">Bento Grid Layout</div> 

  <div class="container py-5">
    <div class="row g-4">
      <div class="col-8">
        <div class="bg-primary text-white d-flex align-items-center justify-content-center rounded-3"  style="height: 250px;">large
        </div>
      </div>

      <div class="col-md-4 d-flex flex-column gap-4">
        <div class="bg-success text-white d-flex align-items-center justify-content-center rounded-3" style="height: 115px;">small 1
        </div>

        <div class="bg-danger text-white d-flex align-items-center justify-content-center rounded-3" style="height: 115px;">small 2
        </div>
      </div>

      <!-- Bottom Medium Items -->
      <div class="col-md-4">
        <div class="bg-warning text-dark d-flex align-items-center justify-content-center rounded-4" style="height: 150px;">
          Medium Item 1
        </div>
      </div>

      <div class="col-md-4">
        <div class="bg-info text-dark d-flex align-items-center justify-content-center rounded-4" style="height: 150px;">
          Medium Item 2
        </div>
      </div>

      <div class="col-md-4">
        <div class="bg-secondary text-white d-flex align-items-center justify-content-center rounded-4" style="height: 150px;">
          Medium Item 3
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
