<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>p1</title>
	<style>

		*{
			box-sizing:border-box ;
			margin: 0px;
		}
		.header{
			height: 10vh;
			width: 100%;
			border: 1px red solid;
		}

		.logo{
			float: left;
			font-size: 20px;
			text-align: center;
			border: 1px solid black;
			padding: 10px 20px;
			margin-right: 20px;
			height:auto;
			line-height: 60px;
		}

		.link{
			float: left;
			padding-top: 10px;
		}

		.link a{
			margin: 0px 6px;
			color: blue;
			font-size: 20px;
		}

		.main{
			height: 80vh;
			width: 100%;
		}

		.mainl{
			float: left;
			height: 80vh;
			width: 40%;
			border: 1px blue solid;
		}

		.bar{
			width: 100%;
			border: 1px solid orange;
			padding: 10px;
			float: left;
			box-sizing: border-box;
			height: 100%;
		}

		.mi{
			border: 1px solid black;
			padding: 15px;
			margin-bottom: 13px;
			text-align: center;
			background-color: #f9f9f9;
			text-transform: uppercase;
			font-weight: bold;
			letter-spacing: 1px;
		}

		.mainr{
			float: left;
			height: 80vh;
			width: 60%;
			border: 1px black solid;
		}

		.ci{
			border: 2px solid purple;
			height: 30vh;
			margin: 10px;
			overflow: auto;
		}

		.i1{
			border: 2px dotted red;
			height: 80%;
			width: 45%;
			margin: 10px 2%;
			padding: auto;
			float: left;
			box-sizing: border-box;
		}

		.i2{
			border: 2px dotted red;
			height: 80%;
			width: 30%;
			padding: auto;
			margin: 10px 1.5%;
			float: left;
			box-sizing: border-box;
		}

		.footer{
			text-align: center;
			border: 2px solid blue;
			padding: 15px;
			clear: both;
			background-color: #f0f0f0;
		}

	</style>
</head>
<body>

	<div class="header">
		<div class="logo">logo here
		</div>
		<div class="link">
			<a href="#">home</a>
			<a href="#">home</a>
			<a href="#">home</a>
		</div>
	</div>

	<div class="main">
		<div class="mainl">
			<div class="bar">
				<div class="mi">Result</div>
				<div class="mi">Apply</div>
				<div class="mi">Placement</div>
				<div class="mi">Recrutment</div>
				<div class="mi">News</div>
			</div>
		</div>

		<div class="mainr">
			<div class="ci">
				<div class="i1"></div>
				<div class="i1"></div>
			</div>
			<div class="ci">
				<div class="i2"></div>
				<div class="i2"></div>
				<div class="i2"></div>
			</div>
		</div>
	</div>

</div>

<div class="footer">footer</div>


</body>
</html>
